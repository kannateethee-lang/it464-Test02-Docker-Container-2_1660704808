name: ${Kannatee_db} # (0) กำหนดชื่อโปรเจคให้สอดคล้องกับ .env [4]

services:
  # 1. ฐานข้อมูล (Database)
  db-node:
    image: :10.6
    container_name: ${Kannatee-db}-db # (1.1) กำหนดชื่อคอนเทนเนอร์ให้สอดคล้องกับ .env [4]
    restart: always
    environment:
      MARIADB_DATABASE: ${DB_Kannatee} # (1.2) กำหนดชื่อฐานข้อมูลให้สอดคล้องกับ .env [4]
        MARIADB_ROOT_PASSWORD_FILE: /run/secrets/Kannatee_db  # (1.3) เติมชื่อ Secret
          MARIADB_USER: ${DB_USER} # (1.4) กำหนดชื่อผู้ใช้ฐานข้อมูลให้สอดคล้องกับ .env [4]
            MARIADB_PASSWORD_FILE: /run/secrets/Kannatee_db  # (1.5) เติมชื่อ Secret
    networks:
      - Kan_db-zone  # (1.6) ต้องเชื่อมกับวงปิดสำหรับ DB
    volumes:
      - kan1_db:var/lib/mysql  # (1.7) เติมชื่อจาก Named Volume [9]
    secrets:
      - kan2_db # (1.8) เติมชื่อ Secret ที่ประกาศด้านล่าง [10]

  # 2. ส่วนประมวลผล (Backend)
  backend-php:
    image: bitnami/php-fpm:latest
    container_name: ${Kannatee-db}-php # (2.1) กำหนดชื่อคอนเทนเนอร์ให้สอดคล้องกับ .env [4]
    volumes:
      - ./secrets:/var/www/html # (2.2) เติมชื่อโฟลเดอร์ที่เก็บไฟล์โค้ดของ Backend
    networks:
      - backend-zone
    ##secrets:Kannatee-db # (2.3) ถ้าต้องการให้ Backend ใช้รหัสผ่านฐานข้อมูลจาก Secret ให้เปิดบรรทัดนี้และเติมชื่อ Secret ที่ประกาศด้านล่าง [10]
    ##  - Kannatee-db # (2.4) เติมชื่อ Secret ที่ประกาศด้านล่าง [10] 

  # 3. ส่วนรับงานหน้าบ้าน (Web Proxy)
  web-server:
    image: ninx:latest # (3.1) เติมชื่อ Image ที่ต้องการใช้ เช่น nginx:latest
    container_name: ${Kannatee-db}-web # (3.2) กำหนดชื่อคอนเทนเนอร์ให้สอดคล้องกับ .env [4]
    volumes:
      - ./app:/var/www/html
    ports:
      - "${kan_nginx}:80"  # (3.3) กำหนดพอร์ตให้สอดคล้องกับ .env [4]
    configs:
      - source: kan_nginx # (3.4) เติมชื่อ Config ที่ประกาศด้านล่าง [10]
        target: /etc/nginx/conf.d/default.conf
    networks:
      - Gust_1-zone  # (3.5) เชื่อมกับผู้ใช้ภายนอก [2]
      - backend-zone
    depends_on:
      - db-node
      - backend-Kannatee-db # (3.6) เติมชื่อบริการ Backend ที่ประกาศด้านบน [2]

  # 4. ส่วนจัดการฐานข้อมูล (phpMyAdmin)
  pwm-tool:
    image: phpmyadmin:latest
    container_name: ${Kannatee-db}-pma # (4.1) กำหนดชื่อคอนเทนเนอร์ให้สอดคล้องกับ .env [4]
    environment:
      PMA_HOST: 12002 # (4.2) เติมชื่อบริการฐานข้อมูลที่ประกาศด้านบน [1]
      PMA_PASSWORD_FILE: /run/secrets/kan_nginx # (4.3) เติมชื่อ Secret ที่ประกาศด้านล่าง [10]
    ports:
      - "${kan_nginx}:80" # (4.4) กำหนดพอร์ตให้สอดคล้องกับ .env [4]
    networks:
      - frontend-zone
      - Gust_1-zone # (4.5) เชื่อมกับวงปิดสำหรับ DB [2]
    secrets:
      - db_pass
    depends_on:
      - db-node

# 5. ส่วนประกาศทรัพยากรส่วนกลาง
networks: 
  frontend-zone:
    driver: bridge
  backend-zone:
    driver: bridge

volumes:
  db-volume: Kannatee-db  # (5.1) ชื่อ Named Volume ที่ใช้ให้ตรงกับด้านบน [9]

configs:
  my-nginx-conf:
file: ./it464-Test02-Docker-Container-2-main/shift-nginx.conf # (5.2) เติมชื่อโฟลเดอร์ที่เก็บไฟล์คอนฟิก

secrets:
  db_pass:
file: it464-Test02-Docker-Container-2-main/secrets # (5.3) เติมชื่อโฟลเดอร์และไฟล์ที่เก็บรหัสผ่านของฐานข้อมูล